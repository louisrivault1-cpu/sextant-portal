name: Add sextant video
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-video:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download and decode video
        run: |
          curl -s https://dpaste.com/AD5EBYSFF.txt >> video.b64
          curl -s https://dpaste.com/HA683GZZW.txt >> video.b64
          curl -s https://dpaste.com/C4S3NFBUH.txt >> video.b64
          curl -s https://dpaste.com/H6839ND49.txt >> video.b64
          curl -s https://dpaste.com/AA69EDQ8G.txt >> video.b64
          tr -d '\n' < video.b64 | base64 -d > sextant.mp4
          ls -la sextant.mp4
          rm video.b64
      
      - name: Commit video
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sextant.mp4
          git commit -m "Add sextant video for about page"
          git push
      
      - name: Clean up workflow
        run: |
          git rm .github/workflows/add-video.yml
          git commit -m "Remove temporary video upload workflow"
          git push
