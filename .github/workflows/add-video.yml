name: Add sextant video
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-video:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download and decode video
        run: |
          for url in AD5EBYSFF HA683GZZW C4S3NFBUH H6839ND49 AA69EDQ8G; do
            curl -s "https://dpaste.com/${url}.txt" | tr -d '\n\r ' >> video.b64
          done
          echo "Base64 file size: $(wc -c < video.b64)"
          base64 -d video.b64 > sextant.mp4
          echo "Video file size: $(ls -la sextant.mp4)"
          rm video.b64
      
      - name: Commit video
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sextant.mp4
          git commit -m "Add sextant video for about page"
          git push
      
      - name: Clean up workflow
        run: |
          git rm .github/workflows/add-video.yml
          git commit -m "Remove temporary video upload workflow"
          git push
