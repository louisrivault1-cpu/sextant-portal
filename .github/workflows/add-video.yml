name: Add sextant video
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-video:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download and decode video
        run: |
          echo "Downloading chunk 1..."
          curl -s "https://dpaste.com/AA6YYFS9Q.txt" >> video.b64
          echo "Chunk 1 done: $(wc -c < video.b64) bytes"
          sleep 5
          echo "Downloading chunk 2..."
          curl -s "https://dpaste.com/5CTPAG7ZW.txt" >> video.b64
          echo "Chunk 2 done: $(wc -c < video.b64) bytes"
          sleep 5
          echo "Downloading chunk 3..."
          curl -s "https://dpaste.com/CKNSNAN75.txt" >> video.b64
          echo "Chunk 3 done: $(wc -c < video.b64) bytes"
          sleep 5
          echo "Downloading chunk 4..."
          curl -s "https://dpaste.com/9SXZSLWS7.txt" >> video.b64
          echo "Chunk 4 done: $(wc -c < video.b64) bytes"
          echo "Adding final inline chunk..."
          printf '%s' '' >> video.b64
          echo "Final: $(wc -c < video.b64) bytes"
          echo "Decoding base64..."
          base64 -d video.b64 > sextant.mp4
          ls -la sextant.mp4
          echo "Expected: ~2402011 bytes"
          rm video.b64
      
      - name: Commit video
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sextant.mp4
          git commit -m "Add sextant video for about page"
          git push
      
      - name: Clean up workflow
        run: |
          git rm .github/workflows/add-video.yml
          git commit -m "Remove temporary video upload workflow"
          git push
