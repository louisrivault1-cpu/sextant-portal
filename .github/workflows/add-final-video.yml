name: Add SEXTANT_FINAL video
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-video:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download video from catbox
        run: |
          echo "Downloading SEXTANT_FINAL.mp4..."
          curl -L -o SEXTANT_FINAL.mp4 "https://files.catbox.moe/1f4lod.mp4"
          ls -la SEXTANT_FINAL.mp4
          echo "Expected: ~7955745 bytes"
      
      - name: Remove old video and commit new one
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm -f sextant.mp4 || true
          git add SEXTANT_FINAL.mp4
          git commit -m "Replace video with SEXTANT_FINAL.mp4"
          git push
      
      - name: Clean up workflow
        run: |
          git rm .github/workflows/add-final-video.yml
          git commit -m "Remove temporary video upload workflow"
          git push
